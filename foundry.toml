[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
ffi = false

# Style lints (mixedCase for KYC/NFT/P2P, etc.) are noisy for this codebase; run `forge lint` when you want a full pass.
[profile.default.lint]
lint_on_build = false

[profile.default.fmt]
line_length = 120
tab_width = 4
bracket_spacing = false

[rpc_endpoints]
bsc_testnet = "${BSC_TESTNET_RPC_URL}"
polygon_mumbai = "${POLYGON_MUMBAI_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"

[etherscan]
bsc_testnet = { key = "${BSCSCAN_API_KEY}" }
polygon_mumbai = { key = "${POLYGONSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }
